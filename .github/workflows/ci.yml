name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  syntax-and-lint:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          errors=0
          for f in $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*"); do
            if ! python -m py_compile "$f" 2>/dev/null; then
              echo "  FAIL: $f"
              python -m py_compile "$f" || true
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "FAILED: $errors files with syntax errors"
            exit 1
          fi
          echo "All Python files passed syntax check"

      - name: Flake8 (fatal errors only)
        run: |
          flake8 . \
            --select=E9,F63,F7,F82 \
            --max-line-length=200 \
            --exclude=venv,.venv,__pycache__,_jaskot-config,_jaskot-clio \
            --count --show-source --statistics

  boot-smoke-test:
    name: Boot Smoke Test (YTB-387)
    runs-on: ubuntu-latest
    needs: [syntax-and-lint]
    steps:
      - uses: actions/checkout@v6

      - name: Create jaskot-config stub for Docker build
        run: |
          # jaskot-config is a private repo. Production deploys clone it with a PAT.
          # CI uses a minimal pip-installable stub so the Docker build can complete.
          mkdir -p _jaskot-config/jaskot_config
          cat > _jaskot-config/pyproject.toml << 'EOF'
          [build-system]
          requires = ["setuptools>=68.0"]
          build-backend = "setuptools.build_meta"
          [project]
          name = "jaskot-config"
          version = "999.0.0+ci"
          requires-python = ">=3.10"
          dependencies = ["requests>=2.28.0"]
          EOF
          cat > _jaskot-config/jaskot_config/__init__.py << 'STUB'
          from dataclasses import dataclass

          @dataclass(frozen=True)
          class CaseType:
              key: str = ""
              display_name: str = ""
              display_name_es: str = ""
              base_fee_cents: int = 0
              fee_type: str = "hourly"
              calcom_event_type_id: int = 0
              calcom_virtual_event_type_id: int | None = None
              ghl_tag_prefix: str = ""
              clio_practice_area_id: int | None = None
              scope_en: str = ""
              scope_es: str = ""

          _registry = {}
          def register(ct):
              _registry[ct.key] = ct
              return ct
          def get(key):
              return _registry.get(key, CaseType(key=key))
          def all_case_types():
              return list(_registry.values())
          def choices():
              return [(ct.key, ct.display_name) for ct in _registry.values()]
          def get_retainer_content(case_type_key="", lang="en", fee_type=None, overrides=None):
              return {}
          def get_document_checklist(case_type_key="", lang="en"):
              return []
          def ghl_safe(*a, **kw): return None
          def ghl_headers(): return {}
          def find_or_create_contact(*a, **kw): return {}
          def tag_contact(*a, **kw): return None
          def add_note(*a, **kw): return None
          def send_message(*a, **kw): return None
          def get_pipeline_stages(*a, **kw): return []
          def create_or_update_opportunity(*a, **kw): return {}
          STUB

      - name: Clone jaskot-clio into build context
        run: |
          git clone https://github.com/Jaredjaskot/jaskot-clio.git _jaskot-clio
          rm -rf _jaskot-clio/.git

      - name: Build Docker image
        run: docker build -t generic-intake-smoke-test .

      - name: Start container
        run: |
          docker run -d --name generic-intake-smoke-test \
            -p 5001:5001 \
            -e SECRET_KEY=test \
            -e ADMIN_AUTH_TOKEN=test \
            -e STRIPE_SECRET_KEY=sk_test_dummy \
            -e STRIPE_PUBLIC_KEY=pk_test_dummy \
            -e STRIPE_WEBHOOK_SECRET=whsec_test \
            -e DATABASE_URL=sqlite:////tmp/intake.db \
            -e BASE_URL=http://localhost:5001 \
            generic-intake-smoke-test

      - name: Wait for health endpoint
        run: |
          echo "Waiting for container to boot..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5001/intake/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "FAILED: Container did not become healthy in 60s"
          echo "=== Container Logs ==="
          docker logs generic-intake-smoke-test
          exit 1

      - name: Teardown
        if: always()
        run: docker rm -f generic-intake-smoke-test 2>/dev/null || true
