name: CD — Deploy to Production

on:
  push:
    branches: [main]

# ================================================================
# Required GitHub Secrets:
#   DEPLOY_HOST          — 45.55.45.24 (Cal.com droplet)
#   DEPLOY_USER          — root
#   DEPLOY_SSH_KEY       — SSH private key for droplet
#   STRIPE_SECRET_KEY    — Stripe secret key
#   STRIPE_PUBLIC_KEY    — Stripe publishable key
#   STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret
#   ADMIN_AUTH_TOKEN     — Staff auth token
#   SECRET_KEY           — Flask secret key
#   CLIO_CLIENT_ID       — Clio OAuth client ID
#   CLIO_CLIENT_SECRET   — Clio OAuth client secret
#   GMAIL_CLIENT_ID      — Google OAuth2 client ID (for Gmail API email)
#   GMAIL_CLIENT_SECRET  — Google OAuth2 client secret
#   GMAIL_REFRESH_TOKEN  — Google OAuth2 refresh token for info@jaskot.law
#   SLACK_DEPLOY_WEBHOOK_URL — Slack webhook for deploy notifications
# ================================================================

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest

    env:
      SLACK_DEPLOY_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SLACK_DEPLOY_WEBHOOK_URL
          script_stop: true
          script: |
            set -e
            echo "=== Deploying generic-intake ==="
            echo "Commit: ${{ github.sha }}"
            echo "Triggered by: ${{ github.actor }}"
            echo ""

            DEPLOY_PATH="/opt/generic-intake"
            CONFIG_PATH="/opt/jaskot-config"

            # Ensure directories exist
            mkdir -p "$DEPLOY_PATH" "$DEPLOY_PATH/data"

            # ── Rollback function ──
            rollback() {
              echo "!!! ROLLBACK triggered !!!"
              PREV_COMMIT=$(cat /tmp/deploy-prev-commit-generic 2>/dev/null || echo "unknown")
              if [ "$PREV_COMMIT" != "unknown" ] && [ -n "$PREV_COMMIT" ]; then
                echo "Rolling back to $PREV_COMMIT..."
                cd "$DEPLOY_PATH"
                git reset --hard "$PREV_COMMIT"
                # Re-copy jaskot-config for build context
                rm -rf "$DEPLOY_PATH/_jaskot-config"
                cp -r "$CONFIG_PATH" "$DEPLOY_PATH/_jaskot-config"
                rm -rf "$DEPLOY_PATH/_jaskot-config/.git"
                docker compose up -d --build --force-recreate
                echo "Rollback complete — now at $(git rev-parse HEAD)"
              else
                echo "No previous commit recorded, cannot auto-rollback"
              fi
              # Slack failure alert
              if [ -n "$SLACK_DEPLOY_WEBHOOK_URL" ]; then
                curl -sf -X POST -H 'Content-type: application/json' \
                  --data "{\"text\":\"🚨 *generic-intake deploy FAILED* — rolled back to \`${PREV_COMMIT:0:7}\`\nCommit: \`${{ github.sha }}\`\nActor: ${{ github.actor }}\"}" \
                  "$SLACK_DEPLOY_WEBHOOK_URL" || true
              fi
            }

            # ── [1/7] Update jaskot-config ──
            echo "[1/7] Updating jaskot-config..."
            if [ -d "$CONFIG_PATH/.git" ]; then
              cd "$CONFIG_PATH" && git fetch origin main && git reset --hard origin/main
            else
              git clone https://github.com/Jaredjaskot/jaskot-config.git "$CONFIG_PATH"
            fi

            # ── [2/7] Pull latest code ──
            echo "[2/7] Pulling latest code..."
            if [ -d "$DEPLOY_PATH/.git" ]; then
              cd "$DEPLOY_PATH"
              PREV_COMMIT=$(git rev-parse HEAD)
              echo "$PREV_COMMIT" > /tmp/deploy-prev-commit-generic
              echo "  Previous commit: $PREV_COMMIT"
              git fetch origin main && git reset --hard origin/main
            else
              # Directory may exist but not be a git repo — clone into temp then move
              echo "unknown" > /tmp/deploy-prev-commit-generic
              TEMP_CLONE="/tmp/generic-intake-clone"
              rm -rf "$TEMP_CLONE"
              git clone https://github.com/Jaredjaskot/generic-intake.git "$TEMP_CLONE"
              # Preserve data/ and .env
              cp -r "$DEPLOY_PATH/data" "$TEMP_CLONE/data" 2>/dev/null || true
              cp "$DEPLOY_PATH/.env" "$TEMP_CLONE/.env" 2>/dev/null || true
              rm -rf "$DEPLOY_PATH"
              mv "$TEMP_CLONE" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            # ── [3/7] Update environment variables ──
            echo "[3/7] Updating environment variables..."
            ENV_FILE="$DEPLOY_PATH/.env"
            touch "$ENV_FILE"
            for VAR_LINE in \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "ADMIN_AUTH_TOKEN=${{ secrets.ADMIN_AUTH_TOKEN }}" \
              "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
              "STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}" \
              "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              "CLIO_CLIENT_ID=${{ secrets.CLIO_CLIENT_ID }}" \
              "CLIO_CLIENT_SECRET=${{ secrets.CLIO_CLIENT_SECRET }}" \
              "CLIO_TOKEN_FILE=/app/data/clio_tokens.json" \
              "DATABASE_URL=sqlite:////app/data/intake.db" \
              "BASE_URL=https://book.jaskot.law" \
              "SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}" \
              "SMTP_APP_PASSWORD=${{ secrets.SMTP_APP_PASSWORD }}" \
              "STAFF_NOTIFY_EMAIL=jared@jaskot.law" \
              "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" \
              "DROPBOX_APP_SECRET=${{ secrets.DROPBOX_APP_SECRET }}" \
              "DROPBOX_REFRESH_TOKEN=${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
              "DROPBOX_RETAINER_PATH=${{ secrets.DROPBOX_RETAINER_PATH }}" \
              "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" \
              "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" \
              "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}"
            do
              VAR_NAME="${VAR_LINE%%=*}"
              if [ -n "${VAR_LINE#*=}" ]; then
                if grep -q "^${VAR_NAME}=" "$ENV_FILE" 2>/dev/null; then
                  sed -i "s|^${VAR_NAME}=.*|${VAR_LINE}|" "$ENV_FILE"
                else
                  echo "$VAR_LINE" >> "$ENV_FILE"
                fi
              fi
            done

            # ── [4/7] Copy jaskot-config into build context ──
            echo "[4/7] Copying jaskot-config into build context..."
            rm -rf "$DEPLOY_PATH/_jaskot-config"
            cp -r "$CONFIG_PATH" "$DEPLOY_PATH/_jaskot-config"
            rm -rf "$DEPLOY_PATH/_jaskot-config/.git"

            # ── [5/7] Update Caddy config ──
            echo "[5/7] Checking Caddy config..."
            CADDY_FILE="/opt/calcom/Caddyfile"
            if ! grep -q 'generic-intake:5001' "$CADDY_FILE" 2>/dev/null; then
              sed -i '/# Everything else/i\    # Generic intake funnel routes → generic-intake container\n    handle /intake* {\n        reverse_proxy generic-intake:5001\n    }\n' "$CADDY_FILE"
              docker exec calcom-caddy caddy reload --config /etc/caddy/Caddyfile
              echo "Caddy config updated — added /intake* route"
            else
              echo "Caddy config already has generic-intake route"
            fi

            # ── [6/7] Build and restart ──
            echo "[6/7] Building and restarting..."
            docker compose up -d --build --force-recreate

            # ── [7/7] Health check with retry loop ──
            echo "[7/7] Verifying health (up to 60s)..."
            HEALTHY=false
            for i in $(seq 1 20); do
              sleep 3
              STATUS=$(curl -sf "http://localhost:5001/intake/health" | grep -o '"status":"ok"' || echo '')
              if [ -n "$STATUS" ]; then
                HEALTHY=true
                echo "  Health check passed on attempt $i"
                break
              fi
              echo "  Attempt $i/20: waiting..."
            done

            if [ "$HEALTHY" != "true" ]; then
              echo ""
              echo "!!! Health check FAILED after 20 attempts !!!"
              echo ""
              echo "=== Container logs (last 50 lines) ==="
              docker compose logs --tail=50 --no-color 2>&1 || true
              rollback
              exit 1
            fi

            # ── Slack success notification ──
            echo ""
            echo "=== Deploy Complete ==="
            if [ -n "$SLACK_DEPLOY_WEBHOOK_URL" ]; then
              curl -sf -X POST -H 'Content-type: application/json' \
                --data "{\"text\":\"✅ *generic-intake deployed*\nCommit: \`${{ github.sha }}\`\nActor: ${{ github.actor }}\"}" \
                "$SLACK_DEPLOY_WEBHOOK_URL" || true
            fi
