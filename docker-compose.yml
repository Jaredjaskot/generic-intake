version: "3.8"

services:
  generic-intake:
    build: .
    container_name: generic-intake
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - calcom_calcom
      - default

networks:
  calcom_calcom:
    external: true
  default:
    driver: bridge
